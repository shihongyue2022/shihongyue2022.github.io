<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>简历打印版</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/resume.js" defer></script>
  </head>
  <body class="resume-page">
    <div class="print-toolbar">
      <a href="index.html">← 返回网站</a>
      <span>建议在打印设置中选择 A4，并关闭页眉和页脚</span>
      <button class="button button-small" type="button" onclick="window.print()">打印 / 保存 PDF</button>
    </div>
    <main class="resume-sheet">
      <header class="resume-header">
        <div>
          <h1 id="resume-name">你的名字</h1>
          <p id="resume-role">开发工程师</p>
        </div>
        <div id="resume-contact" class="resume-contact"></div>
      </header>
      <section class="resume-summary">
        <h2>个人简介</h2>
        <p id="resume-summary"></p>
      </section>
      <div class="resume-columns">
        <div class="resume-main">
          <section><h2>工作与实践经历</h2><div id="resume-experience"></div></section>
          <section><h2>项目经历</h2><div id="resume-projects"></div></section>
        </div>
        <aside class="resume-side">
          <section><h2>专业技能</h2><div id="resume-skills"></div></section>
          <section><h2>教育经历</h2><div id="resume-education"></div></section>
          <section><h2>资格证书</h2><div id="resume-certificates"></div></section>
        </aside>
      </div>
    </main>
  </body>
</html>
